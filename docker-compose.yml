services:
  fastapi:
    build: .
    container_name: Payouts_Backend
    restart: always
    ports:
      - "9000:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      SECRET_KEY: ""
      ALGORITHM: ""
      ACCESS_TOKEN_EXPIRE_MINUTES: ""
      DATABASE_URL: ""
    depends_on:
      - db
    networks:
      - app_network
  
    # resource limits (recommended)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

    # logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Sart2012@"
      POSTGRES_DB: insurance_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network


networks:
  app_network:
    driver: bridge

volumes:
  db_data: